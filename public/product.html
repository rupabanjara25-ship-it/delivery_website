<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Jashpur Express</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        .product-details-container {
            display: flex;
            gap: 3rem;
            max-width: 1200px;
            margin: 0 auto;
            background: var(--white);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }
        .gallery {
            flex: 1;
        }
        .main-image {
            width: 100%;
            height: 400px;
            object-fit: contain;
            border-radius: 10px;
            border: 1px solid #eee;
            margin-bottom: 1rem;
        }
        .thumbnails {
            display: flex;
            gap: 10px;
        }
        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .thumbnail.active {
            border-color: var(--primary-color);
        }
        .details {
            flex: 1;
        }
        .details h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .details .price { font-size: 2rem; color: var(--primary-color); font-weight: 800; margin-bottom: 1.5rem; }
        .details p { color: var(--text-light); margin-bottom: 2rem; }
        @media (max-width: 768px) {
            .product-details-container { flex-direction: column; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Jashpur<span style="color: var(--text-dark);">Express</span></a>
        <div class="header-right">
            <div class="cart-icon" onclick="window.location.href='cart.html'">
                <i class="fas fa-shopping-cart fa-lg"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <main style="margin-top: 100px; padding: 2rem 5%;">
        <div id="productContainer" class="product-details-container">
            Loading...
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/product.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
